<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skadi — RF Signal Identification</title>
    <link rel="stylesheet" href="/static/css/skadi.css">
</head>
<body>
    <!-- Status Bar -->
    <header id="status-bar">
        <div class="status-left">
            <h1>SKADI</h1>
            <span class="subtitle">RF Signal Identification</span>
        </div>
        <div class="status-right">
            <span id="scanner-status" class="badge badge-idle">IDLE</span>
            <span id="sweep-count">Sweeps: 0</span>
            <span id="total-detections">Detections: 0</span>
            <span id="last-sweep">Last: --</span>
        </div>
    </header>

    <!-- Scan Controls -->
    <div id="scan-controls">
        <div class="control-group">
            <label>Start (MHz):</label>
            <input type="number" id="scan-start" value="30" step="1" min="1" max="3000">
            <label>Stop (MHz):</label>
            <input type="number" id="scan-stop" value="174" step="1" min="1" max="3000">
            <button id="btn-start-scan" class="btn-scan">Start Scan</button>
            <button id="btn-stop-scan" class="btn-stop" disabled>Stop Scan</button>
        </div>
        <div id="error-banner" class="error-banner" style="display:none"></div>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Threat Alerts — HIGH and CRITICAL only -->
        <section id="alert-section">
            <h2>Threat Alerts <span class="alert-subtitle">(HIGH / CRITICAL only)</span></h2>
            <div id="alert-feed">
                <div class="empty-state">No high-priority threats detected</div>
            </div>
        </section>

        <!-- Detection History — all signals -->
        <section id="history-section">
            <h2>All Detections</h2>
            <div class="filters">
                <select id="filter-threat">
                    <option value="">All Threat Levels</option>
                    <option value="CRITICAL">CRITICAL</option>
                    <option value="HIGH">HIGH</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="LOW">LOW</option>
                    <option value="INFORMATIONAL">INFORMATIONAL</option>
                </select>
                <input type="number" id="filter-freq-min" placeholder="Min freq (MHz)" step="0.1">
                <input type="number" id="filter-freq-max" placeholder="Max freq (MHz)" step="0.1">
                <button id="btn-filter">Filter</button>
            </div>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th data-sort="timestamp_utc">Time</th>
                            <th data-sort="frequency_hz">Freq (MHz)</th>
                            <th data-sort="modulation">Mod</th>
                            <th data-sort="signal_type">Signal Type</th>
                            <th data-sort="confidence_score">Conf</th>
                            <th data-sort="threat_level">Threat</th>
                            <th data-sort="bandwidth_hz">BW (kHz)</th>
                            <th data-sort="signal_strength_dbm">Power (dBm)</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Detail Panel (slide-in) -->
    <div id="detail-panel" class="detail-panel" style="display:none">
        <div class="detail-header">
            <h3 id="detail-title">Signal Details</h3>
            <button id="detail-close" class="detail-close-btn">X</button>
        </div>
        <div id="detail-content" class="detail-content">
        </div>
    </div>

    <script src="/static/js/socket.io.min.js"></script>
    <script src="/static/js/skadi.js?v=5"></script>
</body>
</html>
